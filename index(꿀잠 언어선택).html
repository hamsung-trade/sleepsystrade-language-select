<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>select your language</title>
    <style>
        /* 기본 설정 및 배경 그라데이션 (회색~검정) 완벽 일치 */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* 위에서 아래로 떨어지는 회색-검정 그라데이션 */
            background: linear-gradient(to bottom, #7a7a7a 0%, #3d3d3d 45%, #050505 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 상단 텍스트 스타일 */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 700;
        }

        .header h1 {
            margin: 0;
            font-size: 1.65rem;
            font-weight: 700;
        }

        /* 버튼들을 담는 컨테이너 */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* 버튼 사이 간격 */
            width: 85%;
            max-width: 330px; /* 원본 비율에 맞춘 넓이 */
        }

        /* 개별 버튼 디자인 (흰색 -> 회색 그라데이션 및 둥근 테두리) */
        .lang-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 75px; /* 원본처럼 도톰한 높이 */
            text-decoration: none;
            color: black;
            font-size: 1.15rem;
            border-radius: 8px; /* 모서리 둥글기 */
            /* 왼쪽 흰색에서 오른쪽 어두운 회색으로 퍼지는 버튼 배경 */
            background: linear-gradient(to right, #ffffff 25%, #757575 100%);
            border: 1px solid rgba(255, 255, 255, 0.6); /* 얇은 테두리 */
        }

        /* 모바일에서 눌렀을 때 약간 투명해지는 기본 효과만 적용 */
        .lang-btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>welcome!</h2>
        <h1>select your langage</h1>
    </div>

    <div class="button-container">
        <a href="https://1772440534110632.dbcart.net/" class="lang-btn">한국어(korean)</a>
        <a href="#" class="lang-btn">English</a>
        <a href="#" class="lang-btn">ภาษาไทย (Thai)</a>
    </div>

</body>
</html>
